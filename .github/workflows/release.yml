name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --clean CaveGenLabs.spec

      - name: Create ZIP
        run: |
          Compress-Archive `
            -Path dist/CaveGenLabs `
            -DestinationPath CaveGenLabs-Windows.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: CaveGenLabs-Windows.zip
